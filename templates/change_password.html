<!DOCTYPE html>
<html>

<head>

    <title>Change Password</title>

    <link rel="stylesheet" href="/static/admin.css">

</head>

<body>

<div class="login-box">

    <h1>Change Password</h1>

    <form method="POST">

        <input
            type="password"
            name="old_password"
            placeholder="Old Password"
            required
        >

        <input
            type="password"
            name="new_password"
            placeholder="New Password"
            required
        >

        <button type="submit">
            Change Password
        </button>

    </form>

    <a href="/dashboard">
        Back To Dashboard
    </a>

</div>

</body>

</html>
